services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      LLM_PROVIDER_ANALYZER: ${LLM_PROVIDER_ANALYZER:-mock}
      LLM_PROVIDER_EXPLAINER: ${LLM_PROVIDER_EXPLAINER:-mock}
      LLM_PROVIDER_TRANSLATOR: ${LLM_PROVIDER_TRANSLATOR:-mock}
      LLM_PROVIDER_TEXT_GENERATOR: ${LLM_PROVIDER_TEXT_GENERATOR:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-}
      SQLITE_DB_PATH: data/app.db
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend_data:
